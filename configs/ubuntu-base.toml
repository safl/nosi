# csi base image — Ubuntu 24.04 LTS (noble)
#
# 26.04 isn't on archive.ubuntu.com yet as of 2026-05; bump when mirrors carry it.
#
# Usage:
#   cijoe tasks/build.yaml --config configs/ubuntu-base.toml --monitor

[csi]
variant = "ubuntu-base"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.csi-ubuntu-base-x86_64]
path = "{{ local.env.HOME }}/guests/csi-ubuntu-base-x86_64"
system_label = "x86_64"
system_image_name = "csi-ubuntu-base-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.csi-ubuntu-base-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/noble-server-cloudimg-amd64.img"
cloud.metadata_path = "{{ resources.auxiliary['cloudinit-metadata'] }}"
cloud.userdata_path = "{{ resources.auxiliary['cloudinit-ubuntu-base'] }}"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/csi-ubuntu-base-x86_64.qcow2"
