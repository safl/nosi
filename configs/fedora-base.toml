# csi base image — Fedora 43
#
# Fedora cloud-image point releases have non-predictable URLs (build numbers
# vary). Pinned to a known-good release; bump as needed.
#
# Usage:
#   cijoe tasks/build.yaml --config configs/fedora-base.toml --monitor

[csi]
variant = "fedora-base"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.csi-fedora-base-x86_64]
path = "{{ local.env.HOME }}/guests/csi-fedora-base-x86_64"
system_label = "x86_64"
system_image_name = "csi-fedora-base-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.csi-fedora-base-x86_64]
system_label = "x86_64"

cloud.url = "https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/Fedora-Cloud-Base-Generic-43.x86_64.qcow2"
cloud.metadata_path = "{{ resources.auxiliary['cloudinit-metadata'] }}"
cloud.userdata_path = "{{ resources.auxiliary['cloudinit-fedora-base'] }}"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/csi-fedora-base-x86_64.qcow2"
