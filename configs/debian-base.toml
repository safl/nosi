# csi base image — Debian 13 (trixie)
#
# Usage:
#   cijoe tasks/build.yaml --config configs/debian-base.toml --monitor

[csi]
variant = "debian-base"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.csi-debian-base-x86_64]
path = "{{ local.env.HOME }}/guests/csi-debian-base-x86_64"
system_label = "x86_64"
system_image_name = "csi-debian-base-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.csi-debian-base-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/debian-13-generic-amd64.qcow2"
cloud.metadata_path = "{{ resources.auxiliary['cloudinit-metadata'] }}"
cloud.userdata_path = "{{ resources.auxiliary['cloudinit-debian-base'] }}"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/csi-debian-base-x86_64.qcow2"
