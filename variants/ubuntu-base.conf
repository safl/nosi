[Distribution]
Distribution=ubuntu
# 26.04 (LTS) isn't on the mirrors yet as of 2026-05; using 24.04 noble until
# archive.ubuntu.com/ubuntu/dists/26.04 returns a Release file.
Release=noble
# Universe is required for helix, zellij, btop on Ubuntu.
Repositories=main,universe

[Output]
ImageId=csi-ubuntu-base

[Content]
Packages=
        linux-image-generic
        systemd-boot
        # ubuntu-specific names for shared bundles (same as Debian)
        build-essential
        dnsutils
        mtr-tiny
        ovmf
        pkg-config
        qemu-system-x86
        qemu-utils
