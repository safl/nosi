name: Docs

on:
  # workflow_run (after build-images): catalog renders against the new
  # :latest. push on docs/**: deploy docs-only changes, which build-images
  # skips via paths-ignore (catalog stays on the current :latest).
  workflow_run:
    workflows: ["build-images"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'docs/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-24.04
    # For workflow_run triggers, only run when the upstream workflow
    # actually succeeded. workflow_run fires on every conclusion
    # (success/failure/cancelled), but a docs build against a failed
    # image build would surface stale catalog rows + look like the docs
    # broke. Skip if upstream failed; the next successful build will
    # refresh the catalog.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5

      - name: Install pipx + LaTeX (for PDF build)
        run: |
          # Drop the runner-preinstalled Microsoft repos (azure-cli,
          # packages.microsoft.com): unused here, and their mirror 403s
          # have failed runs during this apt-get update.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pipx \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre \
            fonts-freefont-otf \
            latexmk \
            make

      - name: Install docs tooling
        run: |
          pipx install ./docs/tooling
          pipx ensurepath
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up oras
        # The docs build pulls each variant's ORAS manifest to render the
        # catalog page: org.opencontainers.image.description annotation
        # for the use-case prose, application/vnd.nosi.metadata.v1+json
        # layer for the tool / package inventory. oras is required on
        # the runner's PATH for both.
        uses: oras-project/setup-oras@v2

      - name: Build HTML
        working-directory: docs
        run: nosi-docs-build-html

      - name: Build PDF
        working-directory: docs
        run: nosi-docs-build-pdf

      - uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: docs-pdf
          path: docs/_build/latex/nosi.pdf
          if-no-files-found: warn
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    # Deploy on main only: a docs/** push, or a green build-images run.
    # PR / workflow_dispatch builds stay artifacts-only.
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-html
          path: html/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: html/

      - id: deployment
        uses: actions/deploy-pages@v4
