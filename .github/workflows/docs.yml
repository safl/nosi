name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install pipx + LaTeX (for PDF build)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pipx \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre \
            fonts-freefont-otf \
            latexmk \
            make

      - name: Install docs tooling
        run: |
          pipx install ./docs/tooling
          pipx ensurepath
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up oras
        # The docs build pulls /etc/nosi-metadata.json from each
        # published image's ORAS manifest to render the catalog page;
        # oras is required on the runner's PATH for that.
        uses: oras-project/setup-oras@v1

      - name: Build HTML
        working-directory: docs
        run: nosi-docs-build-html

      - name: Build PDF
        working-directory: docs
        run: nosi-docs-build-pdf

      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: docs/_build/latex/nosi.pdf
          if-no-files-found: warn
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: html/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: html/

      - id: deployment
        uses: actions/deploy-pages@v4
