name: build-images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up upstream package updates even when nosi hasn't
    # changed. Sunday 03:00 UTC, well clear of weekday CI traffic.
    - cron: '0 3 * * 0'

permissions:
  contents: read
  packages: write    # GHCR push on publish triggers

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PUBLISH: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    # aidev's npm-global installs + WSL post-bake (qemu-nbd mount, chroot
    # strip, tar + gzip of a multi-GiB rootfs) add ~10-15 min over the
    # sysdev runtime, which is tight against the prior 60 min ceiling.
    # Bump uniformly rather than per-variant to keep the matrix simple.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        variant: [debian-sysdev, ubuntu-sysdev, fedora-sysdev, ubuntu-aidev, freebsd-sysdev]

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            pipx \
            cpu-checker \
            xz-utils

      - name: Stage build artefacts on the large /mnt disk
        # Hosted ubuntu-24.04 runners leave only ~14 GiB free on / but mount
        # a ~70 GiB ephemeral disk at /mnt. The build writes the qcow2, the
        # raw intermediate, the .img.gz and (aidev) the WSL tarball under
        # ~/system_imaging; img_gz_publish's qcow2 -> raw -> gzip needs all
        # three on disk at once and overruns /. Point ~/system_imaging at
        # /mnt so the multi-GiB artefacts land on the roomy disk. Done
        # before the cache restore so the cached cloud image lands there too.
        run: |
          sudo mkdir -p /mnt/system_imaging
          sudo chown "$(id -un):$(id -gn)" /mnt/system_imaging
          ln -s /mnt/system_imaging "$HOME/system_imaging"

      - name: Cache upstream cloud image
        # Cloud images are 500MB-2GB downloads; on a fresh runner that's the
        # dominant cost of a cold build. Key on the variant's TOML so a
        # cloud.url change automatically busts the cache. No restore-keys
        # fallback: a stale cache from a prior URL would satisfy
        # diskimage_build's path-existence check and the bake would proceed
        # with the wrong upstream.
        uses: actions/cache@v4
        with:
          path: ~/system_imaging/cloud
          key: cloud-${{ matrix.variant }}-${{ hashFiles(format('cijoe/configs/{0}.toml', matrix.variant)) }}

      - name: Enable KVM access for the runner
        # GHA hosted runners ship /dev/kvm but the runner user isn't in the
        # kvm group, so QEMU's `-accel kvm` fails. Same udev workaround bty
        # uses in its release workflow.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo kvm-ok || true
          ls -l /dev/kvm

      - name: Install cijoe
        run: |
          pipx install cijoe
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build ${{ matrix.variant }}
        run: make build VARIANT=${{ matrix.variant }}

      - name: Show built-image sizes
        # Runs on every event (including PRs) and even if a later step
        # fails -- so the .qcow2 / .img.gz / .tar.gz sizes are visible
        # before the upload + GHCR-push happen. The WSL tarball only
        # exists for aidev variants; missing files render as "(missing)".
        if: always()
        env:
          IMG: ${{ matrix.variant }}
        run: |
          set -eu
          cd "$HOME/system_imaging/disk"
          {
            echo "### \`${IMG}\` built-image sizes"
            echo
            echo "| File | Size | Bytes |"
            echo "|---|---:|---:|"
            for f in nosi-${IMG}-x86_64.qcow2 \
                     nosi-${IMG}-x86_64.img.gz \
                     nosi-${IMG}-wsl.tar.gz; do
                if [ -e "$f" ]; then
                    bytes=$(stat -c%s "$f")
                    printf '| `%s` | %s | %s |\n' \
                        "$f" "$(numfmt --to=iec "$bytes")" "$bytes"
                else
                    printf '| `%s` | _(missing)_ | _(missing)_ |\n' "$f"
                fi
            done
            echo
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stderr}"

      - name: Upload baked image + cijoe report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nosi-${{ matrix.variant }}
          path: |
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.qcow2
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.qcow2.sha256
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.img.gz
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.img.gz.sha256
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-wsl.tar.gz
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-wsl.tar.gz.sha256
            cijoe/cijoe-output/
          if-no-files-found: warn
          retention-days: 14

      # ----- publish (push-to-main, schedule, manual) -----

      - name: Compute rolling tag
        if: env.PUBLISH == 'true'
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: |
          # Use GHA-provided SHA rather than `git rev-parse`: cijoe ran parts
          # of the build as root, which trips git's safe.directory check
          # ("dubious ownership in /__w/nosi/nosi") when the rolling-tag step
          # then runs as the runner user.
          date_tag=$(date -u +'%Y.%m.%d')
          short=${SHA:0:7}
          echo "rolling=${date_tag}-${short}" >> "$GITHUB_OUTPUT"

      - name: Set up oras
        if: env.PUBLISH == 'true'
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          printf '%s' "$GHCR_TOKEN" \
            | oras login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Bundle cijoe report into a zip
        # Ship the build provenance (report.html + per-step cmd_*.output
        # capturing the bake's serial console, the smoketest VM's serial
        # console, etc.) as an extra ORAS layer so consumers can
        # `oras pull` the image and inspect exactly how it was baked.
        # Nobody else does this except for Docker images via labels, but
        # raw provenance is far more useful than a label string.
        if: env.PUBLISH == 'true'
        env:
          IMG: ${{ matrix.variant }}
        run: |
          set -eu
          report="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.cijoe-report.zip"
          (cd cijoe/cijoe-output && zip -qr "${report}" .)
          sha256sum "${report}" > "${report}.sha256"
          ls -lh "${report}"

      - name: Push ${{ matrix.variant }} to GHCR
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
          SHA: ${{ github.sha }}
        run: |
          # cd into the artefacts dir and push by basename so ORAS records
          # plain filenames in the manifest (default behaviour blocks
          # absolute paths to prevent leaking host paths into the artefact).
          # GHA's working-directory: doesn't expand ~, hence the cd here.
          cd "$HOME/system_imaging/disk"
          gz="nosi-${IMG}-x86_64.img.gz"
          report="nosi-${IMG}-x86_64.cijoe-report.zip"
          meta_json="nosi-${IMG}-x86_64.metadata.json"
          meta_md="nosi-${IMG}-x86_64.metadata.md"

          # OCI manifest annotations sourced from the smoketest-extracted
          # metadata. Visible via `oras manifest fetch` without pulling any
          # layer -- the "tell me what this image is" path. metadata.json
          # is REQUIRED here: the smoketest gates publish on the file
          # existing and parsing, so if we got this far it's there. No
          # graceful-degrade fallback -- a missing file would mean the
          # smoketest's gate broke, which we want to find out about loudly.
          jq -e . "${meta_json}" >/dev/null
          flavor=$(jq -r '.nosi.flavor // empty' "${meta_json}")
          distro=$(jq -r '.distro.id // empty' "${meta_json}")
          distro_version=$(jq -r '.distro.version_id // empty' "${meta_json}")
          distro_pretty=$(jq -r '.distro.pretty_name // empty' "${meta_json}")
          kernel_release=$(jq -r '.kernel.release // empty' "${meta_json}")
          built=$(jq -r '.nosi.built // empty' "${meta_json}")
          arch=$(jq -r '.architecture // empty' "${meta_json}")

          oras push \
              "ghcr.io/${REPO}/${IMG}:${ROLLING}" \
              --artifact-type application/vnd.nosi.disk-image.v1+gzip \
              --annotation "org.opencontainers.image.title=nosi-${IMG}-x86_64" \
              --annotation "org.opencontainers.image.description=${distro_pretty} ${flavor} image for DPDK / SPDK / xNVMe / uPCIe development" \
              --annotation "org.opencontainers.image.version=${ROLLING}" \
              --annotation "org.opencontainers.image.created=${built}" \
              --annotation "org.opencontainers.image.revision=${SHA}" \
              --annotation "org.opencontainers.image.source=https://github.com/${REPO}" \
              --annotation "org.opencontainers.image.url=https://github.com/${REPO}" \
              --annotation "org.opencontainers.image.architecture=${arch}" \
              --annotation "org.opencontainers.image.os=linux" \
              --annotation "dev.nosi.variant=${IMG}" \
              --annotation "dev.nosi.flavor=${flavor}" \
              --annotation "dev.nosi.distro=${distro}" \
              --annotation "dev.nosi.distro-version=${distro_version}" \
              --annotation "dev.nosi.kernel-release=${kernel_release}" \
              "${gz}:application/vnd.nosi.disk-image.layer.v1+gzip" \
              "${gz}.sha256:text/plain" \
              "${report}:application/vnd.nosi.build-report.v1+zip" \
              "${report}.sha256:text/plain" \
              "${meta_json}:application/vnd.nosi.metadata.v1+json" \
              "${meta_md}:text/markdown"
          oras tag "ghcr.io/${REPO}/${IMG}:${ROLLING}" latest

      - name: Push ${{ matrix.variant }} WSL rootfs to GHCR
        # Separate repo (${IMG}-wsl) so bty's flashable catalog stays
        # cleanly scoped to disk-images; the WSL artifact is rootfs, not
        # a flashable disk, so colocating tags under the same repo would
        # be misleading. Gated on the artifact existing, which today
        # means matrix.variant == 'ubuntu-aidev'. Same build, same report,
        # so the cijoe-report zip is attached here too for symmetry --
        # operators who pulled the WSL artifact alone still get the
        # provenance.
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          cd "$HOME/system_imaging/disk"
          tarball="nosi-${IMG}-wsl.tar.gz"
          if [ ! -e "${tarball}" ]; then
              echo "No WSL tarball for ${IMG} (expected for sysdev variants)."
              exit 0
          fi
          report="nosi-${IMG}-x86_64.cijoe-report.zip"
          meta_json="nosi-${IMG}-x86_64.metadata.json"
          meta_md="nosi-${IMG}-x86_64.metadata.md"

          # Same metadata, same annotations as the disk-image artefact.
          # Operators who pull just the WSL tag should not have to also
          # pull the disk-image tag to learn what's inside.
          variant=$(jq -r '.nosi.variant // empty' "${meta_json}")
          flavor=$(jq -r '.nosi.flavor // empty' "${meta_json}")
          distro=$(jq -r '.distro.id // empty' "${meta_json}")
          distro_version=$(jq -r '.distro.version_id // empty' "${meta_json}")
          distro_pretty=$(jq -r '.distro.pretty_name // empty' "${meta_json}")
          kernel_release=$(jq -r '.kernel.release // empty' "${meta_json}")
          built=$(jq -r '.nosi.built // empty' "${meta_json}")
          arch=$(jq -r '.architecture // empty' "${meta_json}")

          oras push \
              "ghcr.io/${REPO}/${IMG}-wsl:${ROLLING}" \
              --artifact-type application/vnd.nosi.wsl-rootfs.v1+gzip \
              --annotation "org.opencontainers.image.title=nosi-${IMG}-wsl" \
              --annotation "org.opencontainers.image.description=${distro_pretty} ${flavor} WSL2 rootfs derived from the same bake as nosi-${IMG}" \
              --annotation "org.opencontainers.image.version=${ROLLING}" \
              --annotation "org.opencontainers.image.created=${built}" \
              --annotation "org.opencontainers.image.revision=${SHA}" \
              --annotation "org.opencontainers.image.source=https://github.com/${REPO}" \
              --annotation "org.opencontainers.image.url=https://github.com/${REPO}" \
              --annotation "org.opencontainers.image.architecture=${arch}" \
              --annotation "org.opencontainers.image.os=linux" \
              --annotation "dev.nosi.variant=${variant}" \
              --annotation "dev.nosi.flavor=${flavor}" \
              --annotation "dev.nosi.distro=${distro}" \
              --annotation "dev.nosi.distro-version=${distro_version}" \
              --annotation "dev.nosi.kernel-release=${kernel_release}" \
              "${tarball}:application/vnd.nosi.wsl-rootfs.layer.v1+gzip" \
              "${tarball}.sha256:text/plain" \
              "${report}:application/vnd.nosi.build-report.v1+zip" \
              "${report}.sha256:text/plain" \
              "${meta_json}:application/vnd.nosi.metadata.v1+json" \
              "${meta_md}:text/markdown"
          oras tag "ghcr.io/${REPO}/${IMG}-wsl:${ROLLING}" latest

      - name: Write build summary
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          gz="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.img.gz"
          sha=$(awk '{print $1}' "${gz}.sha256")
          size=$(numfmt --to=iec "$(stat -c%s "${gz}")")
          report="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.cijoe-report.zip"
          rsha=$(awk '{print $1}' "${report}.sha256")
          rsize=$(numfmt --to=iec "$(stat -c%s "${report}")")
          {
            echo "### \`${IMG}\` (${ROLLING})"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Pull ref | \`ghcr.io/${REPO}/${IMG}:${ROLLING}\` |"
            echo "| Latest alias | \`ghcr.io/${REPO}/${IMG}:latest\` |"
            echo "| Blob digest (content-addressed pull) | \`sha256:${sha}\` |"
            echo "| Size | ${size} |"
            echo "| Build report (cijoe-output zip) | ${rsize}, \`sha256:${rsha}\` |"
            echo
            echo "Flash directly:"
            echo
            echo '```'
            echo "curl -sL 'https://ghcr.io/v2/${REPO}/${IMG}/blobs/sha256:${sha}' \\"
            echo "    | gunzip -d \\"
            echo "    | sudo dd of=/dev/sdX bs=4M conv=fsync status=progress"
            echo '```'
            echo
            echo "Pull the full artefact (image + build report) for provenance:"
            echo
            echo '```'
            echo "oras pull ghcr.io/${REPO}/${IMG}:${ROLLING}"
            echo "unzip nosi-${IMG}-x86_64.cijoe-report.zip -d cijoe-report"
            echo "xdg-open cijoe-report/report.html"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # When a WSL tarball was published alongside, append its summary
          # block so consumers see the wsl --import path next to the dd one.
          wsl="$HOME/system_imaging/disk/nosi-${IMG}-wsl.tar.gz"
          if [ -e "${wsl}.sha256" ]; then
              wsha=$(awk '{print $1}' "${wsl}.sha256")
              wsize=$(numfmt --to=iec "$(stat -c%s "${wsl}")")
              {
                echo
                echo "### \`${IMG}-wsl\` (${ROLLING})"
                echo
                echo "| | |"
                echo "|---|---|"
                echo "| Pull ref | \`ghcr.io/${REPO}/${IMG}-wsl:${ROLLING}\` |"
                echo "| Latest alias | \`ghcr.io/${REPO}/${IMG}-wsl:latest\` |"
                echo "| Blob digest (content-addressed pull) | \`sha256:${wsha}\` |"
                echo "| Size | ${wsize} |"
                echo
                echo "Import into WSL (PowerShell):"
                echo
                echo '```powershell'
                echo "curl.exe -sL 'https://ghcr.io/v2/${REPO}/${IMG}-wsl/blobs/sha256:${wsha}' \\"
                echo "    -o ${IMG}-wsl.tar.gz"
                echo "wsl --import nosi-aidev C:\\WSL\\nosi-aidev ${IMG}-wsl.tar.gz"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
          fi
