name: build-images

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up upstream package updates even when csi hasn't
    # changed. Sunday 03:00 UTC keeps it well clear of weekday CI traffic.
    - cron: '0 3 * * 0'

permissions:
  contents: read
  packages: write    # GHCR push on publish triggers

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # PRs build only. Anything else (push to main, schedule, manual) publishes.
  PUBLISH: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant: [debian-base, ubuntu-base, fedora-base]
    container:
      image: ghcr.io/refenv/cijoe-docker:latest
      # /dev/kvm exposes hardware virt to qemu inside the container so cloud-init
      # provisioning runs at acceptable speed.
      options: --device=/dev/kvm

    steps:
      - uses: actions/checkout@v4

      - name: Install cijoe
        run: |
          make deps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build ${{ matrix.variant }}
        run: make build VARIANT=${{ matrix.variant }}

      - name: Package ${{ matrix.variant }}
        run: make package VARIANT=${{ matrix.variant }}

      - name: Upload built qcow2 + cijoe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csi-${{ matrix.variant }}
          path: |
            ~/system_imaging/disk/csi-${{ matrix.variant }}-x86_64.qcow2
            ~/system_imaging/disk/csi-${{ matrix.variant }}-x86_64.qcow2.sha256
            dist/csi-${{ matrix.variant }}.raw.zst
            dist/csi-${{ matrix.variant }}.raw.zst.sha256
            cijoe-output/
          if-no-files-found: warn
          retention-days: 14

      # ----- publish (push-to-main, schedule, manual) -----

      - name: Compute rolling tag
        if: env.PUBLISH == 'true'
        id: tag
        run: |
          date_tag=$(date -u +'%Y.%m.%d')
          short=$(git rev-parse --short=7 HEAD)
          echo "rolling=${date_tag}-${short}" >> "$GITHUB_OUTPUT"

      - name: Set up oras
        if: env.PUBLISH == 'true'
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push ${{ matrix.variant }} to GHCR
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          oras push \
              "ghcr.io/${REPO}/${IMG}:${ROLLING}" \
              --artifact-type application/vnd.csi.disk-image.v1+zstd \
              "dist/csi-${IMG}.raw.zst:application/vnd.csi.disk-image.layer.v1+zstd" \
              "dist/csi-${IMG}.raw.zst.sha256:text/plain"
          oras tag "ghcr.io/${REPO}/${IMG}:${ROLLING}" latest

      - name: Write build summary
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          sha=$(awk '{print $1}' "dist/csi-${IMG}.raw.zst.sha256")
          size=$(numfmt --to=iec "$(stat -c%s "dist/csi-${IMG}.raw.zst")")
          {
            echo "### \`${IMG}\` — ${ROLLING}"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Pull ref | \`ghcr.io/${REPO}/${IMG}:${ROLLING}\` |"
            echo "| Latest alias | \`ghcr.io/${REPO}/${IMG}:latest\` |"
            echo "| Blob digest (bty catalog) | \`sha256:${sha}\` |"
            echo "| Size | ${size} |"
            echo
            echo "Flash directly:"
            echo
            echo '```'
            echo "curl -sL 'https://ghcr.io/v2/${REPO}/${IMG}/blobs/sha256:${sha}' \\"
            echo "    | zstd -d \\"
            echo "    | sudo dd of=/dev/sdX bs=4M conv=fsync status=progress"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
