name: build-images

on:
  push:
    branches: [main]
    # Skip the fleet bake for docs-only changes (Sphinx site, README,
    # license, docs workflow): they don't touch the images. paths-ignore
    # skips only when ALL changed files match. docs.yml deploys the site.
    # schedule / workflow_dispatch ignore path filters and always build.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up upstream package updates even when nosi hasn't
    # changed. Sunday 03:00 UTC, well clear of weekday CI traffic.
    - cron: '0 3 * * 0'

permissions:
  contents: read
  packages: write    # GHCR push on publish triggers

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PUBLISH: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    # The matrix is per-BASE (headless). Each leg bakes its headless base
    # once, then derive_pack builds that base's derived shapes from the
    # same qcow2 in-job (no re-bake, no cross-job artifact passing): the
    # ubuntu-2604 leg also emits wsl + docker, the fedora-44 leg also emits
    # desktop. The derive's qemu-nbd + chroot + strip + (docker import /
    # tar / gzip) adds ~10-20 min on the bases that have derivations, hence
    # the uniform 90 min ceiling.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        variant: [debian-13-headless, ubuntu-2404-headless, ubuntu-2604-headless, fedora-44-headless, freebsd-14-headless, freebsd-15-headless]

    steps:
      - uses: actions/checkout@v5

      - name: Reclaim runner disk space on /
        # Artifacts under ~/system_imaging land on the roomy /mnt disk, but
        # everything else the build writes stays on the cramped / (~14 GiB
        # free on hosted ubuntu-24.04): cijoe/cijoe-output/ captures the
        # bake's full serial console (package_upgrade + ~150-package install)
        # plus the smoketest VM console, and the docker shape's `docker
        # import` lands image layers in /var/lib/docker. Together they
        # overrun /, surfacing as a cijoe log-flush ENOSPC mid-build. Drop
        # the preinstalled toolchains we never use (.NET, GHC/Haskell,
        # Android SDK, CodeQL); the Android SDK alone is the bulk, and the
        # df brackets below report the actual reclaim per runner image
        # (it drifts with every runner-images release).
        run: |
          df -h / | tail -1
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h / | tail -1

      - name: Install build dependencies
        run: |
          # Drop the runner-preinstalled Microsoft repos (azure-cli,
          # packages.microsoft.com): unused here, and their mirror 403s
          # have failed runs during this apt-get update.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            genisoimage \
            pigz \
            pipx \
            cpu-checker \
            xz-utils \
            sshpass \
            e2fsprogs \
            btrfs-progs \
            gdisk \
            zstd \
            systemd-container \
            python3-yaml

      - name: Stage build artifacts on the large /mnt disk
        # Hosted ubuntu-24.04 runners leave only ~14 GiB free on / but mount
        # a ~70 GiB ephemeral disk at /mnt. The build writes the qcow2, the
        # raw intermediate, the .img.gz and (wsl shape) the WSL tarball under
        # ~/system_imaging; img_gz_pack's qcow2 -> raw -> gzip needs all
        # three on disk at once and overruns /. Point ~/system_imaging at
        # /mnt so the multi-GiB artifacts land on the roomy disk. Done
        # before the cache restore so the cached cloud image lands there too.
        run: |
          sudo mkdir -p /mnt/system_imaging
          sudo chown "$(id -un):$(id -gn)" /mnt/system_imaging
          ln -s /mnt/system_imaging "$HOME/system_imaging"

      - name: Cache upstream cloud image
        # Cloud images are 500MB-2GB downloads; on a fresh runner that's the
        # dominant cost of a cold build. Key on the variant's TOML so a
        # cloud.url change automatically busts the cache. No restore-keys
        # fallback: a stale cache from a prior URL would satisfy
        # diskimage_build's path-existence check and the bake would proceed
        # with the wrong upstream.
        uses: actions/cache@v5
        with:
          path: ~/system_imaging/cloud
          key: cloud-${{ matrix.variant }}-${{ hashFiles(format('cijoe/configs/{0}.toml', matrix.variant)) }}

      - name: Enable KVM access for the runner
        # GHA hosted runners ship /dev/kvm but the runner user isn't in the
        # kvm group, so QEMU's `-accel kvm` fails. Same udev workaround bty
        # uses in its release workflow.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo kvm-ok || true
          ls -l /dev/kvm

      - name: Install cijoe
        run: |
          pipx install cijoe
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Discrete cijoe phases as separate GHA steps (Bake, Smoketest, Pack
      # .img.gz, Pack derived shapes, and on the debian leg a Proxmox
      # boot-test) so each has its own duration in the run summary and a
      # failure pinpoints the phase. Smoketest runs SECOND (right after
      # Bake): if the bake is bad we fail before spending minutes packing
      # and deriving from a broken base. Pack, Derive, and the proxmox
      # boot-test only run on a smoketest-passed image.
      #
      # `--tag <name>` per invocation prefixes the archive directory cijoe
      # writes to on workflow end. Without it, two cijoe runs that finish
      # in the same wall-clock second land on the same
      # `cijoe-archive/<YYYY-MM-DD_HH:MM:SS>` path and the second
      # `os.makedirs(archive)` raises FileExistsError. With per-step tags
      # the paths never collide.

      - name: Bake
        run: |
          cd cijoe && cijoe tasks/build.yaml --monitor --tag bake \
            -c configs/${{ matrix.variant }}.toml diskimage_build

      - name: Smoketest
        run: |
          cd cijoe && cijoe tasks/build.yaml --monitor --tag smoketest \
            -c configs/${{ matrix.variant }}.toml image_smoketest

      - name: Pack .img.gz
        run: |
          cd cijoe && cijoe tasks/build.yaml --monitor --tag pack-img \
            -c configs/${{ matrix.variant }}.toml img_gz_pack

      # The derived shapes (desktop / wsl / docker / lxc / proxmox) are NOT
      # built here. The baked headless qcow2 uploaded below is the stable hand-
      # off point; the `derive` job downloads it and builds each shape in its
      # own runner-isolated job, with its own cijoe report. So this job ends at
      # the base: bake, smoketest, pack, upload, publish-base.

      - name: Show built-image sizes
        # Runs on every event (including PRs) and even if a later step
        # fails, so the base qcow2 + .img.gz and every derived artifact
        # (.tar.gz for wsl, derived .img.gz for desktop) are visible before
        # the upload + GHCR-push. The docker shape lands in the local docker
        # daemon rather than a file, so it's reported via `docker images`.
        if: always()
        env:
          IMG: ${{ matrix.variant }}
        run: |
          set -eu
          cd "$HOME/system_imaging/disk"
          {
            echo "### \`${IMG}\` built-image sizes"
            echo
            # "Flashed" is the decompressed (raw) size, what `dd` actually
            # writes, measured by streaming the .img.gz through wc, so the
            # shrink-to-fit is visible and a silent regression (raw back to the
            # full bake disk) can't hide behind gzip squashing the zeros.
            echo "| File | Size | Flashed (raw) | Bytes |"
            echo "|---|---:|---:|---:|"
            for f in nosi-*.qcow2 nosi-*.img.gz nosi-*.tar.gz nosi-*.tar.zst; do
                [ -e "$f" ] || continue
                bytes=$(stat -c%s "$f")
                flashed="-"
                case "$f" in
                    *.img.gz) flashed="$(numfmt --to=iec "$(zcat "$f" | wc -c)")" ;;
                esac
                printf '| `%s` | %s | %s | %s |\n' \
                    "$f" "$(numfmt --to=iec "$bytes")" "$flashed" "$bytes"
            done
            echo
            echo "Local OCI images (docker shape):"
            echo '```'
            docker images 'nosi-*' 2>/dev/null || true
            echo '```'
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stderr}"

      - name: Upload baked image + cijoe report (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nosi-${{ matrix.variant }}
          path: |
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.qcow2
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.qcow2.sha256
            ~/system_imaging/disk/nosi-*.img.gz
            ~/system_imaging/disk/nosi-*.img.gz.sha256
            ~/system_imaging/disk/nosi-*.tar.gz
            ~/system_imaging/disk/nosi-*.tar.gz.sha256
            ~/system_imaging/disk/nosi-*.tar.zst
            ~/system_imaging/disk/nosi-*.tar.zst.sha256
            ~/system_imaging/disk/nosi-*.metadata.json
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.cloud-init-output.log
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.cloud-init.log
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.nosi-release
            cijoe/cijoe-output/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload base qcow2 for the derive jobs
        # A dedicated single-file artifact (clean root, no nested paths) is the
        # hand-off to the `derive` jobs, which download it and build each shape.
        # Only the bases that have derives need it; freebsd / ubuntu-2404 don't.
        if: >-
          matrix.variant == 'debian-13-headless' ||
          matrix.variant == 'ubuntu-2604-headless' ||
          matrix.variant == 'fedora-44-headless'
        uses: actions/upload-artifact@v7
        with:
          name: base-qcow2-${{ matrix.variant }}
          path: ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.qcow2
          if-no-files-found: error
          retention-days: 1

      # ----- publish (push-to-main, schedule, manual) -----

      - name: Compute rolling tag
        if: env.PUBLISH == 'true'
        id: tag
        run: |
          # ISO-week tag (YYYY.WNN): %G is the ISO 8601 year (which can
          # differ from the calendar year for a few days around year-end),
          # %V is the zero-padded ISO week 01-53. Multiple pushes within
          # the same week reuse the same tag and clobber prior bytes on
          # both ghcr and the GitHub release; intentional, per the
          # "weekly cadence, clobber within the week" policy.
          echo "rolling=$(date -u +'%G.W%V')" >> "$GITHUB_OUTPUT"

      - name: Set up oras
        if: env.PUBLISH == 'true'
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        # Both clients: oras for the disk-image / wsl-rootfs artifacts,
        # docker for the docker-shape OCI image (`docker push`).
        if: env.PUBLISH == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        # Retried: GHCR has transient wobbles (5xx, propagation lag) and a
        # one-shot login losing the dice roll fails the whole publish.
        run: |
          for i in 1 2 3 4 5; do
              printf '%s' "$GHCR_TOKEN" \
                | oras login ghcr.io -u "$GHCR_USER" --password-stdin \
              && printf '%s' "$GHCR_TOKEN" \
                | docker login ghcr.io -u "$GHCR_USER" --password-stdin \
              && break
              if [ "$i" = 5 ]; then
                  echo "::error::ghcr login failed after 5 attempts"
                  exit 1
              fi
              echo "::warning::ghcr login attempt $i failed; retrying"
              sleep $((i * 10))
          done

      - name: Bundle cijoe report into a zip
        # Ship the build provenance (report.html + per-step cmd_*.output
        # capturing the bake's serial console, the smoketest VM's serial
        # console, etc.) as an extra ORAS layer so consumers can
        # `oras pull` the image and inspect exactly how it was baked.
        # Nobody else does this except for Docker images via labels, but
        # raw provenance is far more useful than a label string.
        if: env.PUBLISH == 'true'
        env:
          IMG: ${{ matrix.variant }}
        run: |
          set -eu
          report="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.cijoe-report.zip"
          (cd cijoe/cijoe-output && zip -qr "${report}" .)
          sha256sum "${report}" > "${report}.sha256"
          ls -lh "${report}"

      - name: Publish base to GHCR
        # Push the headless base .img.gz via oras (its own repo
        # ghcr.io/<repo>/<variant>, so bty's flashable catalog stays scoped to
        # real disk images). Annotations come from the base's own metadata.json
        # (the smoketest extracted it), description from descriptions/<variant>.md
        # via gen_catalog --describe. Derived shapes are published by the
        # `derive` job.
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          # GHA's working-directory: doesn't expand ~, hence the cd; push
          # by basename so ORAS records plain filenames (not host paths).
          cd "$HOME/system_imaging/disk"
          report="nosi-${IMG}-x86_64.cijoe-report.zip"
          gc="python3 $GITHUB_WORKSPACE/tools/gen_catalog.py"

          # One shared copy of the annotated, retried push: see the
          # contract in .github/scripts/oras-push.sh.
          source "$GITHUB_WORKSPACE/.github/scripts/oras-push.sh"

          # Base headless: flashable .img.gz disk-image. The derived shapes are
          # published by the `derive` job, each pushing its own one shape.
          oras_push "ghcr.io/${REPO}/${IMG}:${ROLLING}" \
              application/vnd.nosi.disk-image.v1+gzip \
              application/vnd.nosi.disk-image.layer.v1+gzip \
              "nosi-${IMG}-x86_64.img.gz" \
              "nosi-${IMG}-x86_64.metadata.json" \
              "$($gc --describe "${IMG}")"

      - name: Write build summary
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          IMG:  ${{ matrix.variant }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          gz="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.img.gz"
          sha=$(awk '{print $1}' "${gz}.sha256")
          size=$(numfmt --to=iec "$(stat -c%s "${gz}")")
          report="$HOME/system_imaging/disk/nosi-${IMG}-x86_64.cijoe-report.zip"
          rsha=$(awk '{print $1}' "${report}.sha256")
          rsize=$(numfmt --to=iec "$(stat -c%s "${report}")")
          {
            echo "### \`${IMG}\` (${ROLLING})"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Pull ref | \`ghcr.io/${REPO}/${IMG}:${ROLLING}\` |"
            echo "| Latest alias | \`ghcr.io/${REPO}/${IMG}:latest\` |"
            echo "| Blob digest (content-addressed pull) | \`sha256:${sha}\` |"
            echo "| Size | ${size} |"
            echo "| Build report (cijoe-output zip) | ${rsize}, \`sha256:${rsha}\` |"
            echo
            echo "Flash directly:"
            echo
            echo '```'
            echo "curl -sL 'https://ghcr.io/v2/${REPO}/${IMG}/blobs/sha256:${sha}' \\"
            echo "    | gunzip -d \\"
            echo "    | sudo dd of=/dev/sdX bs=4M conv=fsync status=progress"
            echo '```'
            echo
            echo "Pull the full artifact (image + build report) for provenance:"
            echo
            echo '```'
            echo "oras pull ghcr.io/${REPO}/${IMG}:${ROLLING}"
            echo "unzip nosi-${IMG}-x86_64.cijoe-report.zip -d cijoe-report"
            echo "xdg-open cijoe-report/report.html"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  derive:
    # One job per derived shape. Each downloads the baked headless qcow2 (the
    # stable hand-off the `build` job uploaded), builds exactly that one shape
    # with derive_pack, boot-tests it where applicable, and uploads its own
    # cijoe report. Runner-isolated: no shared disk / NBD contention, and a
    # single shape failing never touches the others. `needs: build` waits for
    # the bases; the derives then run in parallel.
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: debian-13-desktop,   base: debian-13-headless,   output: img, test: desktop }
          - { variant: debian-13-lxc,       base: debian-13-headless,   output: lxc, test: none }
          - { variant: debian-13-proxmox,   base: debian-13-headless,   output: img, test: proxmox }
          - { variant: ubuntu-2604-wsl,     base: ubuntu-2604-headless, output: tar, test: none }
          - { variant: ubuntu-2604-docker,  base: ubuntu-2604-headless, output: oci, test: none }
          - { variant: ubuntu-2604-lxc,     base: ubuntu-2604-headless, output: lxc, test: none }
          - { variant: fedora-44-desktop,   base: fedora-44-headless,   output: img, test: desktop }
          - { variant: fedora-44-lxc,       base: fedora-44-headless,   output: lxc, test: none }

    steps:
      - uses: actions/checkout@v5

      - name: Reclaim runner disk space on /
        run: |
          df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h / | tail -1

      - name: Install build dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils genisoimage pigz pipx cpu-checker \
            xz-utils sshpass e2fsprogs btrfs-progs gdisk zstd \
            systemd-container python3-yaml jq

      - name: Stage build artifacts on the large /mnt disk
        run: |
          sudo mkdir -p /mnt/system_imaging
          sudo chown "$(id -un):$(id -gn)" /mnt/system_imaging
          ln -s /mnt/system_imaging "$HOME/system_imaging"

      - name: Enable KVM access for the runner
        # The desktop / proxmox boot-tests QEMU-boot the derived image.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install cijoe
        run: |
          pipx install cijoe
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download baked base qcow2
        uses: actions/download-artifact@v7
        with:
          name: base-qcow2-${{ matrix.base }}
          path: ${{ github.workspace }}/.base-qcow2

      - name: Place base qcow2 where derive_pack expects it
        run: |
          mkdir -p "$HOME/system_imaging/disk"
          mv "$GITHUB_WORKSPACE/.base-qcow2/nosi-${{ matrix.base }}-x86_64.qcow2" \
             "$HOME/system_imaging/disk/"
          ls -lh "$HOME/system_imaging/disk/"

      - name: Build derived shape
        env:
          NOSI_DERIVE_VARIANT: ${{ matrix.variant }}
        run: |
          sudo modprobe nbd max_part=8
          cd cijoe && cijoe tasks/build.yaml --monitor --tag "derive-${{ matrix.variant }}" \
            -c configs/${{ matrix.base }}.toml derive_pack

      - name: Boot-test (desktop)
        # Boots the derived desktop on NVMe and reads the greeter / panic verdict
        # off the serial console. The bake never boots the desktop derive, which
        # is how a host-only initramfs kernel-panicked on real hardware.
        if: matrix.test == 'desktop'
        run: |
          cd cijoe && cijoe tasks/build.yaml --monitor --tag desktop-smoketest \
            -c configs/${{ matrix.base }}.toml desktop_smoketest

      - name: Boot-test (proxmox)
        # Boots the derived PVE host and asserts the stack comes up on first boot.
        if: matrix.test == 'proxmox'
        run: |
          cd cijoe && cijoe tasks/build.yaml --monitor --tag proxmox-smoketest \
            -c configs/${{ matrix.base }}.toml proxmox_smoketest

      - name: Show built artifact size
        if: always()
        run: |
          ls -lh "$HOME/system_imaging/disk/" 2>/dev/null | grep -E "${{ matrix.variant }}" || true
          docker images 'nosi-*' 2>/dev/null || true

      - name: Upload derived artifact + cijoe report (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nosi-${{ matrix.variant }}
          path: |
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.img.gz
            ~/system_imaging/disk/nosi-${{ matrix.variant }}-x86_64.img.gz.sha256
            ~/system_imaging/disk/nosi-${{ matrix.variant }}.tar.gz
            ~/system_imaging/disk/nosi-${{ matrix.variant }}.tar.gz.sha256
            ~/system_imaging/disk/nosi-${{ matrix.variant }}.tar.zst
            ~/system_imaging/disk/nosi-${{ matrix.variant }}.tar.zst.sha256
            ~/system_imaging/disk/nosi-${{ matrix.variant }}.metadata.json
            cijoe/cijoe-output/
          if-no-files-found: warn
          retention-days: 14

      # ----- publish the one shape (push-to-main / schedule / manual) -----

      - name: Compute rolling tag
        if: env.PUBLISH == 'true'
        id: tag
        # ISO-week tag; see the comment on the build job's identical step
        # for the cadence policy.
        run: echo "rolling=$(date -u +'%G.W%V')" >> "$GITHUB_OUTPUT"

      - name: Set up oras
        if: env.PUBLISH == 'true'
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          for i in 1 2 3 4 5; do
              printf '%s' "$GHCR_TOKEN" | oras login ghcr.io -u "$GHCR_USER" --password-stdin \
              && printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin \
              && break
              if [ "$i" = 5 ]; then echo "::error::ghcr login failed after 5 attempts"; exit 1; fi
              echo "::warning::ghcr login attempt $i failed; retrying"
              sleep $((i * 10))
          done

      - name: Publish derived shape to GHCR
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          V: ${{ matrix.variant }}
          OUTPUT: ${{ matrix.output }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          cd "$HOME/system_imaging/disk"
          report="nosi-${V}.cijoe-report.zip"
          (cd "$GITHUB_WORKSPACE/cijoe/cijoe-output" && zip -qr "$HOME/system_imaging/disk/${report}" .)
          sha256sum "${report}" > "${report}.sha256"
          gc="python3 $GITHUB_WORKSPACE/tools/gen_catalog.py"
          source "$GITHUB_WORKSPACE/.github/scripts/oras-push.sh"
          case "$OUTPUT" in
          img)
              oras_push "ghcr.io/${REPO}/${V}:${ROLLING}" \
                  application/vnd.nosi.disk-image.v1+gzip \
                  application/vnd.nosi.disk-image.layer.v1+gzip \
                  "nosi-${V}-x86_64.img.gz" "nosi-${V}.metadata.json" \
                  "$($gc --describe "${V}")" ;;
          tar)
              oras_push "ghcr.io/${REPO}/${V}:${ROLLING}" \
                  application/vnd.nosi.wsl-rootfs.v1+gzip \
                  application/vnd.nosi.wsl-rootfs.layer.v1+gzip \
                  "nosi-${V}.tar.gz" "nosi-${V}.metadata.json" \
                  "$($gc --describe-wsl "${V}")" ;;
          lxc)
              oras_push "ghcr.io/${REPO}/${V}:${ROLLING}" \
                  application/vnd.nosi.lxc-rootfs.v1+zstd \
                  application/vnd.nosi.lxc-rootfs.layer.v1+zstd \
                  "nosi-${V}.tar.zst" "nosi-${V}.metadata.json" \
                  "$($gc --describe "${V}")" ;;
          oci)
              # Real OCI image (docker import in derive_pack): docker push.
              docker tag "nosi-${V}:latest" "ghcr.io/${REPO}/${V}:${ROLLING}"
              docker tag "nosi-${V}:latest" "ghcr.io/${REPO}/${V}:latest"
              for tag in "${ROLLING}" latest; do
                  attempts=0
                  until docker push "ghcr.io/${REPO}/${V}:${tag}"; do
                      attempts=$((attempts + 1))
                      if [ $attempts -ge 5 ]; then
                          echo "::error::docker push ${V}:${tag} failed after $attempts attempts"; exit 1
                      fi
                      echo "::warning::docker push ${V}:${tag} attempt $attempts failed; retrying"
                      sleep $((attempts * 10))
                  done
              done ;;
          *) echo "::error::unknown derive output ${OUTPUT} for ${V}"; exit 1 ;;
          esac

  build-rpi:
    # Raspberry Pi OS (arm64) for Pi 4 + Pi 5. Not a QEMU bake: Raspberry Pi
    # OS does not boot in a generic QEMU `virt` machine, so the image is
    # customized in place via loop-mount + chroot (rpi_image_build). Runs on
    # an arm64 hosted runner so the chroot is NATIVE (no qemu-user
    # emulation). One leg emits the headless base AND the desktop derive (the
    # build/smoketest/pack scripts each process base + derives in one go).
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - name: Reclaim runner disk space on /
        run: |
          df -h / | tail -1
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/local/lib/android 2>/dev/null || true
          df -h / | tail -1

      - name: Install build dependencies
        # No qemu-system / KVM: the Pi image is never booted. losetup + mount +
        # chroot come from util-linux (base); growpart from cloud-guest-utils,
        # resize2fs/e2fsck from e2fsprogs, xz-utils to decompress the upstream
        # image, pigz for the .img.gz pack.
        run: |
          # Drop the runner-preinstalled Microsoft repos (azure-cli,
          # packages.microsoft.com): unused here, and their mirror 403s
          # have failed runs during this apt-get update.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cloud-guest-utils \
            e2fsprogs \
            dosfstools \
            xz-utils \
            pigz \
            pipx \
            python3-yaml \
            jq

      - name: Stage build artifacts on the large /mnt disk
        run: |
          sudo mkdir -p /mnt/system_imaging
          sudo chown "$(id -un):$(id -gn)" /mnt/system_imaging
          ln -s /mnt/system_imaging "$HOME/system_imaging"

      - name: Cache upstream Raspberry Pi OS image
        uses: actions/cache@v5
        with:
          path: ~/system_imaging/cloud
          key: cloud-rpios-13-headless-${{ hashFiles('cijoe/configs/rpios-13-headless.toml') }}

      - name: Install cijoe
        run: |
          pipx install cijoe
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Three discrete phases (build -> smoketest -> pack), each its own GHA
      # step for per-phase timing + a pinpointed failure. Smoketest runs
      # before pack so a bad bake fails before packing. Each step handles the
      # headless base AND the desktop derive.

      - name: Bake (chroot)
        run: |
          cd cijoe && cijoe tasks/build-rpi.yaml --monitor --tag bake \
            -c configs/rpios-13-headless.toml rpi_image_build

      - name: Smoketest (offline)
        run: |
          cd cijoe && cijoe tasks/build-rpi.yaml --monitor --tag smoketest \
            -c configs/rpios-13-headless.toml rpi_image_smoketest

      - name: Pack .img.gz
        run: |
          cd cijoe && cijoe tasks/build-rpi.yaml --monitor --tag pack \
            -c configs/rpios-13-headless.toml rpi_image_pack

      - name: Show built-image sizes
        if: always()
        run: |
          set -eu
          cd "$HOME/system_imaging/disk" || exit 0
          {
            echo "### Raspberry Pi built-image sizes"
            echo
            echo "| File | Size | Bytes |"
            echo "|---|---:|---:|"
            for f in nosi-rpios-*.img.gz; do
                [ -e "$f" ] || continue
                bytes=$(stat -c%s "$f")
                printf '| `%s` | %s | %s |\n' "$f" "$(numfmt --to=iec "$bytes")" "$bytes"
            done
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stderr}"

      - name: Upload baked images + cijoe report (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nosi-rpios-13-arm64
          path: |
            ~/system_imaging/disk/nosi-rpios-*.img.gz
            ~/system_imaging/disk/nosi-rpios-*.img.gz.sha256
            ~/system_imaging/disk/nosi-rpios-*.metadata.json
            cijoe/cijoe-output/
          if-no-files-found: warn
          retention-days: 14

      # ----- publish (push-to-main, schedule, manual) -----

      - name: Compute rolling tag
        if: env.PUBLISH == 'true'
        id: tag
        # ISO-week tag; see the comment on the x86 build job's identical
        # step for the cadence policy.
        run: echo "rolling=$(date -u +'%G.W%V')" >> "$GITHUB_OUTPUT"

      - name: Set up oras
        if: env.PUBLISH == 'true'
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        # Retried: same GHCR-wobble rationale as the x86 login.
        run: |
          for i in 1 2 3 4 5; do
              printf '%s' "$GHCR_TOKEN" \
                | oras login ghcr.io -u "$GHCR_USER" --password-stdin \
              && break
              if [ "$i" = 5 ]; then
                  echo "::error::ghcr login failed after 5 attempts"
                  exit 1
              fi
              echo "::warning::ghcr login attempt $i failed; retrying"
              sleep $((i * 10))
          done

      - name: Bundle cijoe report into a zip
        if: env.PUBLISH == 'true'
        run: |
          set -eu
          report="$HOME/system_imaging/disk/nosi-rpios-13-arm64.cijoe-report.zip"
          (cd cijoe/cijoe-output && zip -qr "${report}" .)
          sha256sum "${report}" > "${report}.sha256"
          ls -lh "${report}"

      - name: Publish headless + desktop to GHCR
        # Both Pi variants are flashable .img.gz disk-images; push each to its
        # own repo (ghcr.io/<repo>/<variant>) with annotations from its own
        # metadata.json + variants.yml description. Same oras_push helper as
        # the x86 job, arch read from the metadata (arm64).
        if: env.PUBLISH == 'true'
        env:
          REPO: ${{ github.repository }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          cd "$HOME/system_imaging/disk"
          report="nosi-rpios-13-arm64.cijoe-report.zip"
          gc="python3 $GITHUB_WORKSPACE/tools/gen_catalog.py"

          # Same shared push helper as the x86 job (6-arg form);
          # media types passed explicitly below.
          source "$GITHUB_WORKSPACE/.github/scripts/oras-push.sh"

          for v in rpios-13-headless rpios-13-desktop; do
              oras_push "ghcr.io/${REPO}/${v}:${ROLLING}" \
                  application/vnd.nosi.disk-image.v1+gzip \
                  application/vnd.nosi.disk-image.layer.v1+gzip \
                  "nosi-${v}-arm64.img.gz" \
                  "nosi-${v}-arm64.metadata.json" \
                  "$($gc --describe "${v}")"
          done

  publish-catalog:
    # Cut a GitHub release carrying the bty-compatible catalog.toml so an
    # operator can point bty at it:
    #   bty --catalog https://github.com/safl/nosi/releases/latest/download/catalog.toml
    # Runs once (not per-variant) AFTER every base + derived shape + the Pi
    # built and pushed, so the catalog only advertises images that actually
    # shipped. needs: [build, derive, build-rpi] means one failed leg (a base,
    # any derived shape, or the Pi) blocks the catalog. Deliberate: the
    # catalog should not point at an image whose build broke.
    # PRs don't publish (same gate as the per-variant GHCR push).
    needs: [build, derive, build-rpi]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write    # create the release + upload the asset
    steps:
      - uses: actions/checkout@v5

      - name: Install catalog-generator deps
        run: |
          # Drop the runner-preinstalled Microsoft repos (azure-cli,
          # packages.microsoft.com): unused here, and their mirror 403s
          # have failed runs during this apt-get update.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Compute rolling tag
        id: tag
        # Same ISO-week scheme as the build / derive / Pi jobs, recomputed
        # here so this job doesn't depend on a matrix output. See the
        # x86 build job's identical step for the cadence policy.
        run: echo "rolling=$(date -u +'%G.W%V')" >> "$GITHUB_OUTPUT"

      - name: Generate catalog.toml (pinned to this release's dated tag) and catalog-latest.toml (rolling :latest)
        env:
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          # Two catalogs per release, both uploaded as assets:
          #   catalog.toml         : refs pinned to :${ROLLING}; same bytes
          #                          every flash for as long as the ghcr tag
          #                          exists. This is the default an operator
          #                          wants if they care about reproducibility.
          #   catalog-latest.toml  : refs as :latest; rolling escape hatch
          #                          for operators who want "whatever ghcr
          #                          currently serves" without pinning their
          #                          catalog URL.
          # Both files are uploaded to EVERY release, so the URL/file pair
          # decides the policy:
          #   releases/<tag>/download/catalog.toml          -> frozen at <tag>
          #   releases/latest/download/catalog.toml         -> rolls forward;
          #                                                    each fetch is
          #                                                    internally
          #                                                    pinned
          #   releases/<tag>/download/catalog-latest.toml   -> always :latest
          #   releases/latest/download/catalog-latest.toml  -> always :latest
          python3 tools/gen_catalog.py --ref-tag "${ROLLING}" catalog.toml
          python3 tools/gen_catalog.py --ref-tag latest      catalog-latest.toml

      - name: Publish catalog.toml + catalog-latest.toml as rolling release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ROLLING: ${{ steps.tag.outputs.rolling }}
        run: |
          set -eu
          # Build release notes via printf so each line stays properly
          # indented inside this YAML literal-scalar block (a column-1
          # ``*`` would otherwise look like a YAML alias to the parser).
          notes=$(printf '%s\n' \
              "nosi image catalog (schema v1). Two flavours:" \
              "" \
              "* \`catalog.toml\`        : refs pinned to \`:${ROLLING}\`; reproducible flashes" \
              "* \`catalog-latest.toml\` : refs as \`:latest\`; rolling escape hatch" \
              "" \
              "Flash with bty:" \
              "\`\`\`" \
              "bty --catalog https://github.com/${REPO}/releases/latest/download/catalog.toml" \
              "\`\`\`" \
              "The layer digest is verified at flash time regardless of tag policy.")
          # Idempotent: a re-dispatch on the same commit reuses the tag, so
          # create-or-clobber. --latest makes releases/latest/download/
          # resolve to this asset. Retried because the GitHub API has the
          # same transient wobbles as GHCR, and idempotence makes a retry
          # safe (worst case the asset is clobbered with identical bytes).
          publish_catalog() {
              if gh release view "${ROLLING}" >/dev/null 2>&1; then
                  gh release upload "${ROLLING}" catalog.toml catalog-latest.toml --clobber
              else
                  gh release create "${ROLLING}" catalog.toml catalog-latest.toml \
                      --latest \
                      --title "nosi ${ROLLING}" \
                      --notes "${notes}"
              fi
          }
          attempts=0
          until publish_catalog; do
              attempts=$((attempts + 1))
              if [ $attempts -ge 5 ]; then
                  echo "::error::catalog release upload failed after $attempts attempts"
                  exit 1
              fi
              echo "::warning::catalog release upload attempt $attempts failed; retrying"
              sleep $((attempts * 10))
          done
