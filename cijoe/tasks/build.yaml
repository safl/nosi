---
doc: |
  nosi image build
  ================

  1. ``diskimage_build``: download the upstream cloud image, resize boot
     disk, build a NoCloud seed.iso from the variant's .user, boot QEMU
     and let cloud-init run apply.sh. Compact + checksum the baked qcow2.
  2. ``image_smoketest``: boot the baked qcow2 on a copy-on-write overlay
     (no seed attached, so the boot mirrors what a downstream consumer
     sees), SSH in as odus via the baked password, install a per-run key
     over that channel, then assert the published contract -- metadata
     JSON, motd rendered, tools on PATH, sudo works, root login blocked,
     etc. Failure here fails the whole build so neither the .img.gz nor
     any derives ever get packed.
  3. ``img_gz_pack``: convert qcow2 -> raw -> gzip-compressed .img.gz with
     a sha256 sidecar, for direct ``dd`` flashing.
  4. ``netboot_bundle_pack``: qemu-nbd-attach the baked qcow2 and pull
     the image's own vmlinuz + initrd out of /boot into a small bundle
     directory alongside a manifest. Bty + nbdmux fetch this pair to
     ramboot the image with its OWN kernel (see PLAN-netboot-bundle.md).
     No-op on images without a ``[netboot]`` section.
  5. ``derive_pack``: build the derived-shape artifacts from the baked
     headless rootfs (no re-bake). For each ``[[...derive]]`` entry in
     the base config it copies the base qcow2, chroots in, runs
     ``apply.sh <derived-variant> --shape-only``, optionally strips
     kernel/boot/cloud-init, and repackages: bootable .img.gz (desktop),
     rootfs .tar.gz (wsl), or an OCI image via ``docker import``
     (docker). No-op for a base with no ``derive`` list.

  Smoketest runs SECOND, not last, so a bad bake fails fast and we don't
  waste minutes packing .img.gz + deriving shapes from a broken base.
  Note "pack", not "publish": these steps produce local artifacts; the
  push to GHCR is a separate GHA workflow step gated on this whole task
  passing.

  Variant is selected via ``-c configs/<variant>.toml``; ``[nosi].variant``
  drives the image-name lookup and download URLs.

steps:
- name: diskimage_build
  uses: diskimage_build

- name: image_smoketest
  uses: image_smoketest

- name: img_gz_pack
  uses: img_gz_pack

- name: netboot_bundle_pack
  uses: netboot_bundle_pack

- name: derive_pack
  uses: derive_pack

- name: proxmox_smoketest
  uses: proxmox_smoketest

- name: desktop_smoketest
  uses: desktop_smoketest
