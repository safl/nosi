---
doc: |
  Set up the NVIDIA software stack on a freshly-flashed nosi-ubuntu-2404-sysdev
  box (Ubuntu 24.04 noble, GA 6.8 kernel).

  Direct port of xnvme/aisio/tasks/setup_nvstack.yaml, adjusted for nosi's
  defaults: target user is `odus` (NOPASSWD sudo), root SSH is locked,
  the sysdev baseline already provides linux-headers + linux-tools +
  the nouveau blacklist + DKMS prereqs.

  Prerequisites:

    * Target running nosi-ubuntu-2404-sysdev or nosi-ubuntu-2404-aidev
      (Ubuntu 24.04 noble, kernel 6.8 GA; HWE must NOT be installed).
    * SSH key authorized on odus@<target>:
        ssh-copy-id odus@<target>
    * cijoe configured with workflows/configs/my-transport.toml pointing
      at the target (see configs/transport.toml.example).

  Running:

    cijoe --monitor \
        -c workflows/configs/cudadev.toml \
        -c workflows/configs/my-transport.toml \
        workflows/setup_cudadev.yaml

  Stages:

    1. MLNX_OFED install with --enable-gds (multi-reboot).
    2. NVIDIA NOKM driver install (DKMS rebuild).
    3. CUDA toolkit install via NVIDIA apt repo.
    4. nvidia-gds (GPUDirect Storage).
    5. /etc/profile.d/cuda.sh wiring.
    6. cuda-samples checkout for later experimentation.

steps:
- name: workdir_prep
  run: |
    mkdir -p ~/workdir ~/git

- name: ofed_fetch_and_install
  run: |
    cd ~/workdir
    wget -O ofed.tgz {{ config.nvidia.ofed.url }}
    tar xzf ofed.tgz
    cd MLNX_OFED_LINUX-*/
    sudo ./mlnxofedinstall \
        --with-nvmf --with-nfsrdma --enable-gds \
        --add-kernel-support --dkms -q
    sudo update-initramfs -u -k $(uname -r)

- name: reboot_after_ofed
  run: sudo shutdown -r now

- name: wait_down_ofed
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 60

- name: wait_up_ofed
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: nokm_driver
  run: |
    sudo apt-get install -y \
        nvidia-driver-{{ config.nvidia.nokm.version }}-server-open

# Build the NVIDIA kernel source tree to generate symbols / headers
# required by downstream consumers (libnvm / BAM). DKMS doesn't do
# this automatically; the upstream xnvme/aisio workflow does it.
- name: nokm_kernel_source
  run: |
    sudo bash -c \
        'cd /usr/src/nvidia-*{{ config.nvidia.nokm.version }}*/ && make -j'

- name: reboot_after_nokm
  run: sudo shutdown -r now

- name: wait_down_nokm
  uses: core.wait_for_transport
  with:
    state: down
    timeout: 60

- name: wait_up_nokm
  uses: core.wait_for_transport
  with:
    state: up
    timeout: 300

- name: cuda_apt_repo
  run: |
    cd ~/workdir
    wget -O cuda-keyring.deb {{ config.nvidia.keyring.url }}
    sudo dpkg -i cuda-keyring.deb
    sudo apt-get update

- name: cuda_toolkit
  run: |
    sudo apt-get install -y \
        cuda-toolkit-{{ config.nvidia.cuda.apt_version }}

# /etc/profile.d/cuda.sh puts /usr/local/cuda on PATH + LD_LIBRARY_PATH
# for every interactive login shell. Matches xnvme/aisio's wiring.
- name: cuda_profile
  run: |
    sudo tee /etc/profile.d/cuda.sh > /dev/null <<'EOF'
    # CUDA environment (managed by nosi cudadev setup workflow)
    if [ -d /usr/local/cuda ]; then
        case ":$PATH:" in
            *":/usr/local/cuda/bin:"*) : ;;
            *) export PATH="/usr/local/cuda/bin:$PATH" ;;
        esac
        case ":$LD_LIBRARY_PATH:" in
            *":/usr/local/cuda/lib64:"*) : ;;
            *) export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}" ;;
        esac
    fi
    EOF
    sudo chmod 0644 /etc/profile.d/cuda.sh

- name: cuda_check
  run: |
    /usr/local/cuda/bin/nvcc --version || true
    nvidia-smi || true

- name: cuda_samples_checkout
  run: |
    if [ ! -d ~/git/cuda-samples ]; then
        git clone {{ config.nvidia.cuda.samples.remote }} ~/git/cuda-samples
    fi
    cd ~/git/cuda-samples
    git fetch --tags
    git checkout {{ config.nvidia.cuda.samples.tag }}
    mkdir -p build

- name: nvidia_gds
  run: |
    sudo apt-get install -y \
        nvidia-gds-{{ config.nvidia.cuda.apt_version }}

- name: final_checkup
  run: |
    lsmod | grep nvidia || true
    nvidia-smi || true
    dmesg | grep -i nvidia | tail -20 || true
