# nosi base image : Ubuntu 24.04 LTS (noble)
#
# The LTS that NVIDIA CUDA / NOKM / DOCA, AMD ROCm / amdgpu-install, and
# Mellanox MLNX_OFED qualify against. cijoe/workflows/setup_cudadev.yaml
# and setup_rocmdev.yaml pin to this base.
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=ubuntu-2404-headless

[nosi]
variant = "ubuntu-2404-headless"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-ubuntu-2404-headless-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-ubuntu-2404-headless-x86_64"
system_label = "x86_64"
system_image_name = "nosi-ubuntu-2404-headless-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-ubuntu-2404-headless-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/noble-server-cloudimg-amd64.img"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-headless-ubuntu-2404.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2404-headless-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2404-headless-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2404-headless-x86_64.img.gz"
publish.gzip_level = 9

# Netboot bundle: vmlinuz + initrd extracted from the baked qcow2 so bty
# can nbdboot this image via NBD using the image's OWN kernel.
netboot.bundle_dir = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2404-headless-netboot-x86_64"
netboot.source_disk_ref = "ghcr.io/safl/nosi/ubuntu-2404-headless"
