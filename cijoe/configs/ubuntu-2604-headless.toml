# nosi base image : Ubuntu 26.04 LTS (resolute)
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=ubuntu-2604-headless

[nosi]
variant = "ubuntu-2604-headless"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-ubuntu-2604-headless-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-ubuntu-2604-headless-x86_64"
system_label = "x86_64"
system_image_name = "nosi-ubuntu-2604-headless-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-ubuntu-2604-headless-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/resolute-server-cloudimg-amd64.img"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-headless-ubuntu-2604.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2604-headless-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2604-headless-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-2604-headless-x86_64.img.gz"
publish.gzip_level = 9

# Shapes derived from this headless base (derive_pack copies the
# baked qcow2, chroots, runs `apply.sh <variant> --shape-only`, then
# packages). No re-bake. See cijoe/scripts/derive_pack.py.
#   wsl    -> nosi-ubuntu-2604-wsl.tar.gz   (strip; `wsl --import`)
#   docker -> local OCI image nosi-ubuntu-2604-docker:latest (strip;
#             build.yml retags + pushes to ghcr.io/<repo>/ubuntu-2604-docker)
[[system-imaging.images.nosi-ubuntu-2604-headless-x86_64.derive]]
variant = "ubuntu-2604-wsl"
output = "tar"
strip = true

[[system-imaging.images.nosi-ubuntu-2604-headless-x86_64.derive]]
variant = "ubuntu-2604-docker"
output = "oci"
strip = true

#   lxc    -> nosi-ubuntu-2604-lxc.tar.zst  (Proxmox CT / Incus system container)
[[system-imaging.images.nosi-ubuntu-2604-headless-x86_64.derive]]
variant = "ubuntu-2604-lxc"
output = "lxc"
strip = true
