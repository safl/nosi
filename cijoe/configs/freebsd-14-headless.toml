# nosi base image : FreeBSD 14.4-RELEASE
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=freebsd-14-headless
#
# This is the Phase 1 scaffold: it downloads the BASIC-CLOUDINIT raw.xz
# image, decompresses + converts it to qcow2 on first run, and boots the
# cloud-init seed to set up odus + lock root + strip per-instance
# identity. No apply.sh provision steps yet -- those land in Phase 2
# once each step has been audited for FreeBSD applicability (pkg vs
# apt/dnf, rc.d vs systemd, kld vs DKMS, loader.conf vs grub, etc).

[nosi]
variant = "freebsd-14-headless"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-freebsd-14-headless-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-freebsd-14-headless-x86_64"
system_label = "x86_64"
system_image_name = "nosi-freebsd-14-headless-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-freebsd-14-headless-x86_64]
system_label = "x86_64"

# FreeBSD VM images ship as xz-compressed raw disks rather than qcow2;
# diskimage_build.py detects the .raw.xz suffix and decompresses +
# converts to qcow2 on first download (cached as a sibling .qcow2 in
# the cloud cache dir so re-runs are fast).
cloud.url = "https://download.freebsd.org/releases/VM-IMAGES/14.4-RELEASE/amd64/Latest/FreeBSD-14.4-RELEASE-amd64-BASIC-CLOUDINIT-ufs.raw.xz"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/FreeBSD-14.4-RELEASE-amd64-BASIC-CLOUDINIT-ufs.raw.xz"
# Relative paths resolve from repo root (diskimage_build.py uses Path.cwd().parent).
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-headless-freebsd-14.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-14-headless-x86_64.qcow2"
# UFS cannot be shrunk after the bake, so bake size == ship size. Use the
# smallest disk that still fits the install (base + tools + /usr/src ~1.5 GB +
# the transient src.txz extraction, over UFS's ~8% reserve); native 6 GiB
# overflows, and 9 GiB was tight enough that the 14.4-p6 transient peak
# (firstboot_freebsd_update install + src.txz extract) silently filled the
# disk and left /usr/src truncated (974 zero-byte files, missing
# conf/kmod.mk and sys/param.h), which then broke any kernel-module build
# (DPDK contigmem.ko etc) on consumer images. growfs expands the partition
# to the real disk on first boot, but UFS files only grow at write-time;
# files truncated at bake stay truncated.
disk.bake_size = "12G"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-14-headless-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-14-headless-x86_64.img.gz"
publish.gzip_level = 9
