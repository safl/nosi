# nosi base image : Ubuntu 26.04 LTS (resolute)
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=ubuntu-base

[nosi]
variant = "ubuntu-base"
hostname = "nosi-ubuntu"
timezone = "UTC"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-ubuntu-base-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-ubuntu-base-x86_64"
system_label = "x86_64"
system_image_name = "nosi-ubuntu-base-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-ubuntu-base-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/resolute-server-cloudimg-amd64.img"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-base-ubuntu.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-base-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-base-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-base-x86_64.img.gz"
publish.gzip_level = 9
