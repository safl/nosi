# nosi aidev : Ubuntu 26.04 LTS (resolute) + NVIDIA + agentic CLIs
#
# Single bake feeds two derived artifacts:
#   * .img.gz   - flashable x86_64 (sysdev superset + AI tooling)
#   * .tar.gz   - WSL2 rootfs (kernel/grub/firmware/cloud-init stripped
#                 post-bake)
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=ubuntu-aidev

[nosi]
variant = "ubuntu-aidev"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-ubuntu-aidev-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-ubuntu-aidev-x86_64"
system_label = "x86_64"
system_image_name = "nosi-ubuntu-aidev-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-ubuntu-aidev-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/resolute-server-cloudimg-amd64.img"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-aidev-ubuntu.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-x86_64.qcow2"

# Flashable .img.gz output (target = x86_64).
publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-x86_64.img.gz"
publish.gzip_level = 9

# WSL rootfs .tar.gz output (target = wsl). wsl_rootfs_publish reads this
# block; absent the block, the step no-ops and the bake produces only the
# flashable .img.gz. work_qcow2_path is a per-build scratch copy of the
# baked qcow2 that virt-customize mutates before tar-out.
publish_wsl.work_qcow2_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-wsl.work.qcow2"
publish_wsl.tar_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-wsl.tar"
publish_wsl.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-ubuntu-aidev-wsl.tar.gz"
publish_wsl.gzip_level = 9
