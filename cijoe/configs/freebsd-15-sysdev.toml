# nosi base image : FreeBSD 15.0-RELEASE
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=freebsd-15-sysdev
#
# This is the Phase 1 scaffold: it downloads the BASIC-CLOUDINIT raw.xz
# image, decompresses + converts it to qcow2 on first run, and boots the
# cloud-init seed to set up odus + lock root + strip per-instance
# identity. No apply.sh provision steps yet -- those land in Phase 2
# once each step has been audited for FreeBSD applicability (pkg vs
# apt/dnf, rc.d vs systemd, kld vs DKMS, loader.conf vs grub, etc).

[nosi]
variant = "freebsd-15-sysdev"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-freebsd-15-sysdev-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-freebsd-15-sysdev-x86_64"
system_label = "x86_64"
system_image_name = "nosi-freebsd-15-sysdev-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-freebsd-15-sysdev-x86_64]
system_label = "x86_64"

# FreeBSD VM images ship as xz-compressed raw disks rather than qcow2;
# diskimage_build.py detects the .raw.xz suffix and decompresses +
# converts to qcow2 on first download (cached as a sibling .qcow2 in
# the cloud cache dir so re-runs are fast).
cloud.url = "https://download.freebsd.org/releases/VM-IMAGES/15.0-RELEASE/amd64/Latest/FreeBSD-15.0-RELEASE-amd64-BASIC-CLOUDINIT-ufs.raw.xz"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/FreeBSD-15.0-RELEASE-amd64-BASIC-CLOUDINIT-ufs.raw.xz"
# Relative paths resolve from repo root (diskimage_build.py uses Path.cwd().parent).
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-sysdev-freebsd-15.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-15-sysdev-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-15-sysdev-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-freebsd-15-sysdev-x86_64.img.gz"
publish.gzip_level = 9
