# nosi desktop : Fedora 44 + Hyprland tiling Wayland compositor
#
# Personal laptop / workstation use. Layers the desktop stack
# (Hyprland + greetd/tuigreet + foot/waybar/fuzzel/mako + Firefox +
# audio/bluetooth/power-management) on top of the headless baseline.
# Fedora-only for the recent kernel + Wayland-first userland + PipeWire
# defaults.
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=fedora-44-desktop

[nosi]
variant = "fedora-44-desktop"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-fedora-44-desktop-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-fedora-44-desktop-x86_64"
system_label = "x86_64"
system_image_name = "nosi-fedora-44-desktop-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-fedora-44-desktop-x86_64]
system_label = "x86_64"

cloud.url = "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/Fedora-Cloud-Base-Generic-44.x86_64.qcow2"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-desktop-fedora-44.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-desktop-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-desktop-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-desktop-x86_64.img.gz"
publish.gzip_level = 9
