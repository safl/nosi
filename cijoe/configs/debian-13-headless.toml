# nosi base image : Debian 13 (trixie)
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=debian-13-headless

[nosi]
variant = "debian-13-headless"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-debian-13-headless-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-debian-13-headless-x86_64"
system_label = "x86_64"
system_image_name = "nosi-debian-13-headless-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-debian-13-headless-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/debian-13-generic-amd64.qcow2"
# Relative paths resolve from repo root (diskimage_build.py uses Path.cwd().parent).
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-headless-debian-13.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-debian-13-headless-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-debian-13-headless-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-debian-13-headless-x86_64.img.gz"
publish.gzip_level = 9

# Desktop derives from this headless base (derive_pack copies the baked
# qcow2, chroots, runs `apply.sh debian-13-desktop --shape-only` which
# installs the Sway stack via step 50, then packages a bootable .img.gz, no
# strip, kernel kept). firefox-esr comes from Debian main (a real deb, no
# snap), so the apt desktop branch is clean here. No re-bake.
[[system-imaging.images.nosi-debian-13-headless-x86_64.derive]]
variant = "debian-13-desktop"
output = "img"
strip = false

# LXC system-container template (Proxmox CT / Incus): derive_pack runs
# `apply.sh debian-13-lxc --shape-only` (step 56 masks growroot + adds
# ifupdown), strips kernel/firmware/NetworkManager, validates the rootfs under
# systemd-nspawn, and packs a zstd tarball for `pct create`. No re-bake.
[[system-imaging.images.nosi-debian-13-headless-x86_64.derive]]
variant = "debian-13-lxc"
output = "lxc"
strip = true

# Proxmox VE host: derive_pack runs `apply.sh debian-13-proxmox --shape-only`
# (step 60 installs proxmox-ve into the chroot via policy-rc.d), then packs a
# bootable .img.gz (no strip, PVE kernel kept). Flash to the OS NVMe; PVE
# daemons come up on first boot (pveproxy on :8006).
[[system-imaging.images.nosi-debian-13-headless-x86_64.derive]]
variant = "debian-13-proxmox"
output = "img"
strip = false
