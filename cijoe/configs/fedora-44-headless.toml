# nosi base image : Fedora 44
#
# Fedora cloud-image point releases have non-predictable URLs (build numbers
# vary). Pinned to a known-good release; bump as needed.
#
# Usage (from repo root, the Makefile cd's into cijoe/):
#   make build VARIANT=fedora-44-headless

[nosi]
variant = "fedora-44-headless"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

[qemu.guests.nosi-fedora-44-headless-x86_64]
path = "{{ local.env.HOME }}/system_imaging/guests/nosi-fedora-44-headless-x86_64"
system_label = "x86_64"
system_image_name = "nosi-fedora-44-headless-x86_64"
system_args.kwa = { cpu = "host", smp = 4, m = "4G", accel = "kvm" }
system_args.tcp_forward = { host = 4200, guest = 22 }

[system-imaging.images.nosi-fedora-44-headless-x86_64]
system_label = "x86_64"

cloud.url = "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/Fedora-Cloud-Base-Generic-44.x86_64.qcow2"
cloud.metadata_path = "nosi-media/auxiliary/cloudinit-metadata.meta"
cloud.userdata_path = "nosi-media/auxiliary/cloudinit-headless-fedora-44.user"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-headless-x86_64.qcow2"

publish.raw_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-headless-x86_64.img"
publish.gz_path = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-headless-x86_64.img.gz"
publish.gzip_level = 9

# Netboot bundle: vmlinuz + initrd extracted from the baked qcow2 so bty
# can ramboot this image via NBD using the image's OWN kernel.
netboot.bundle_dir = "{{ local.env.HOME }}/system_imaging/disk/nosi-fedora-44-headless-netboot-x86_64"
netboot.source_disk_ref = "ghcr.io/safl/nosi/fedora-44-headless"

# Desktop derives from this headless base (derive_pack copies the
# baked qcow2, chroots, runs `apply.sh fedora-44-desktop --shape-only`
# which installs the Sway stack via step 50, then packages a bootable
# .img.gz -- no strip, kernel kept). No re-bake.
[[system-imaging.images.nosi-fedora-44-headless-x86_64.derive]]
variant = "fedora-44-desktop"
output = "img"
strip = false

# LXC system-container template (Proxmox CT / Incus). dnf-strip removes the
# kernel/firmware/NetworkManager; step 56 installs systemd-networkd (Fedora
# CTs network through it). zstd rootfs tarball for `pct create`.
[[system-imaging.images.nosi-fedora-44-headless-x86_64.derive]]
variant = "fedora-44-lxc"
output = "lxc"
strip = true
