# Shared defaults for every base image under mkosi.images/.
# Per-image mkosi.conf files override Distribution / Release and may extend
# Packages.

[Distribution]
Architecture=x86-64

[Output]
Format=disk
OutputDirectory=mkosi.output
CacheDirectory=mkosi.cache

[Content]
Bootable=yes
Bootloader=systemd-boot
Locale=C.UTF-8
Timezone=UTC
WithDocs=no
WithNetwork=yes
SELinuxRelabel=no
Packages=
        ca-certificates
        cloud-init
        openssh-server
        sudo
        systemd-resolved
        # user-requested baseline toolset
        btop
        git
        helix
        htop
        meson
        ninja-build
        zellij
        # network & debug (universally-named)
        curl
        jq
        lsof
        nmap
        strace
        tcpdump
        wget
        # build & dev (universally-named)
        clang
        gdb
        make
        pipx
        python3
        # containers (rootless, daemonless) + docker CLI shim
        buildah
        podman
        podman-docker
        skopeo
        # hardware & storage (universally-named, xNVMe-relevant)
        dmidecode
        hdparm
        lshw
        nvme-cli
        pciutils
        smartmontools
        usbutils

[Host]
QemuMem=2G
QemuSmp=2
