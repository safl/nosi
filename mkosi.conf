# Shared defaults for every csi image. Each variant is built by overlaying a
# distro-specific config from variants/<name>.conf via `mkosi --include`.
# This file MUST NOT set Distribution/Release/ImageId — those belong in the
# per-variant config.

[Distribution]
Architecture=x86-64

[Output]
Format=disk
OutputDirectory=mkosi.output

[Build]
CacheDirectory=mkosi.cache
WithNetwork=yes

[Content]
Bootable=yes
Bootloader=systemd-boot
Locale=C.UTF-8
Timezone=UTC
WithDocs=no
SELinuxRelabel=no
Packages=
        ca-certificates
        cloud-init
        openssh-server
        sudo
        systemd-resolved
        # user-requested baseline toolset
        btop
        git
        helix
        htop
        meson
        ninja-build
        zellij
        # network & debug (universally-named)
        curl
        jq
        lsof
        nmap
        strace
        tcpdump
        wget
        # build & dev (universally-named)
        clang
        gdb
        make
        pipx
        python3
        # containers (rootless, daemonless) + docker CLI shim
        buildah
        podman
        podman-docker
        skopeo
        # hardware & storage (universally-named, xNVMe-relevant)
        dmidecode
        hdparm
        lshw
        nvme-cli
        pciutils
        smartmontools
        usbutils

[Runtime]
RAM=2G
CPUs=2
