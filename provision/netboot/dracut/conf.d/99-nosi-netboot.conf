# Managed by nosi/provision/steps/34-netboot-ramboot-hook.sh
# Force the nosi bty-ramboot module into every generated initrd so the
# image can ramboot from an NBD export when bty.nbd= is on the cmdline.
# The 99bty-ramboot module (in /usr/lib/dracut/modules.d/) is
# check()-gated to 255 (opt-in only), so this conf line is what pulls
# it into the initrd.
add_dracutmodules+=" 99bty-ramboot "
# Pin the drivers we need at boot time. On host-only builds dracut
# would otherwise trim these (the build VM's root isn't NBD-backed).
add_drivers+=" nbd overlay ext4 xfs btrfs "
