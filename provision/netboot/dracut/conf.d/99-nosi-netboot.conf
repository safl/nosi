# Managed by nosi/provision/steps/34-netboot-ramboot-hook.sh
# Force the nosi pixie-ramboot module into every generated initrd so
# the image can ramboot from an NBD export when pixie.nbd= (or the
# legacy bty.nbd=) is on the cmdline.
# The module lives at /usr/lib/dracut/modules.d/99pixie-ramboot/ (99
# is dracut's ordering prefix) but is referenced without the prefix
# in add_dracutmodules= -- dracut strips the leading digits when
# matching module names. Get the name wrong here and dracut errors
# out with ``Module 'X' cannot be found``.
add_dracutmodules+=" pixie-ramboot "
# Pin the drivers we need at boot time. On host-only builds dracut
# would otherwise trim these (the build VM's root isn't NBD-backed).
add_drivers+=" nbd overlay ext4 xfs btrfs "
