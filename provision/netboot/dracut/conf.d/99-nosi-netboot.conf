# Managed by nosi/provision/steps/34-netboot-nbdboot-hook.sh
# Force the nosi-nbdboot module into every generated initrd so the
# image can netboot from an NBD export when bty.nbd= is on the cmdline.
# The module lives at /usr/lib/dracut/modules.d/99nosi-nbdboot/ (99 is
# dracut's ordering prefix) but is referenced without the prefix in
# add_dracutmodules= -- dracut strips the leading digits when matching
# module names. Get the name wrong here and dracut errors out with
# ``Module 'X' cannot be found``.
add_dracutmodules+=" nosi-nbdboot "
# Pin the drivers we need at boot time. On host-only builds dracut
# would otherwise trim these (the build VM's root isn't NBD-backed).
add_drivers+=" nbd overlay ext4 xfs btrfs "
