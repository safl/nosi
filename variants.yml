# nosi variant registry -- single source of truth for per-variant
# metadata that more than one tool needs. Consumed by:
#
#   .github/workflows/build.yml   the matrix's ORAS image.description
#                                 annotation (via tools/gen_catalog.py
#                                 --describe / --describe-wsl)
#   tools/gen_catalog.py          the bty-compatible catalog.toml
#                                 published as a GitHub release asset
#
# The build matrix itself (which variants get baked) still lives in
# build.yml; this file is the metadata keyed by that matrix's names.
# Keep the two in sync: a variant baked but absent here fails the
# push step's --describe lookup loudly (no generic placeholder).
#
# Fields:
#   shape        headless | desktop | wsl | docker | lxc | proxmox --
#                the artifact's form factor.
#   flashable    true if the published .img.gz is a flashable disk image
#                that belongs in bty's catalog; false for the wsl rootfs
#                (imported via `wsl --import`, not flashed to a block dev).
#   arch         target architecture for the catalog label; optional,
#                defaults to x86_64. Set to arm64 for the Raspberry Pi
#                variants.
#
# The use-case prose ("what is this variant for?") is NOT here: each
# variant's description lives in its own file, descriptions/<name>.md,
# and the wsl shape's separate rootfs blurb in descriptions/<name>.wsl.md.
# gen_catalog.py reads those for the ORAS image.description annotation and
# the catalog entry. One description per file keeps this registry to pure
# structured metadata and lets the prose be edited (and reviewed) on its
# own.

variants:

  debian-13-headless:
    shape: headless
    flashable: true

  debian-13-desktop:
    shape: desktop
    flashable: true

  debian-13-lxc:
    shape: lxc
    flashable: false

  debian-13-proxmox:
    shape: proxmox
    flashable: true

  ubuntu-2404-headless:
    shape: headless
    flashable: true

  ubuntu-2604-headless:
    shape: headless
    flashable: true

  ubuntu-2604-wsl:
    shape: wsl
    flashable: false

  ubuntu-2604-docker:
    shape: docker
    flashable: false

  ubuntu-2604-lxc:
    shape: lxc
    flashable: false

  fedora-44-headless:
    shape: headless
    flashable: true

  fedora-44-desktop:
    shape: desktop
    flashable: true

  fedora-44-lxc:
    shape: lxc
    flashable: false

  rpios-13-headless:
    shape: headless
    flashable: true
    arch: arm64

  rpios-13-desktop:
    shape: desktop
    flashable: true
    arch: arm64

  freebsd-14-headless:
    shape: headless
    flashable: true

  freebsd-15-headless:
    shape: headless
    flashable: true
